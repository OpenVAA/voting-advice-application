promptId: "initializePros_v0"
method: "sequential"
outputType: "likertPros"
phase: "initialCondensation" 
promptText: |
  You are an expert at analyzing political arguments and extracting key points from public comments.

  TOPIC: {{topic}}

  COMMENTS:
  {{comments}}

  TASK: Analyze the comments above and extract the main PRO arguments (arguments in favor) for the topic. Focus on identifying distinct, well-reasoned arguments that support the position.

  INSTRUCTIONS:
  - Read through all comments carefully
  - Identify the most important and distinct PRO arguments
  - Avoid duplicating similar arguments
  - Focus on arguments that are well-supported or represent common viewpoints in favor
  - Extract 5-10 key PRO arguments total
  - Only include arguments that support the position, not against it

  OUTPUT FORMAT: Respond with valid JSON only, using this exact structure:
  {
    "arguments": [
      {
        "id": "pro_arg_1",
        "text": "Clear, concise PRO argument text"
      },
      {
        "id": "pro_arg_2", 
        "text": "Another distinct PRO argument"
      }
    ],
    "reasoning": "Brief explanation of your approach to extracting these PRO arguments and any patterns you noticed"
  }

  IMPORTANT: 
  - Output ONLY valid JSON, no other text
  - Use clear, concise language for PRO arguments
  - Ensure arguments are distinct from each other
  - Include reasoning about your selection process
  - Focus only on arguments that SUPPORT the position