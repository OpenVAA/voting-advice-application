promptId: "refinePros_v0"
method: "refine"
outputType: "likertPros"
phase: "mainCondensation" 
promptText: |
  You are an expert at refining and improving political arguments based on new information and feedback.

  TOPIC: {{topic}}

  CURRENT PRO ARGUMENTS:
  {{currentArguments}}

  NEW BATCH COMMENTS:
  {{newBatchComments}}

  TASK: Review the current PRO arguments and the new batch of comments. Refine, improve, and consolidate the PRO arguments to create a more comprehensive and well-structured set of arguments in favor of the position.

  INSTRUCTIONS:
  - Analyze how the new comments relate to existing PRO arguments
  - Strengthen weak PRO arguments with supporting evidence from new comments
  - Merge similar or overlapping PRO arguments
  - Add new distinct PRO arguments if the new comments reveal important supporting perspectives
  - Remove redundant or weak PRO arguments
  - Ensure PRO arguments are clear, concise, and well-reasoned
  - Maintain focus on arguments that support the position
  - Aim for 5-8 high-quality, distinct PRO arguments

  REFINEMENT CRITERIA:
  - Clarity: PRO arguments should be easy to understand
  - Distinctness: Each PRO argument should represent a unique supporting perspective
  - Strength: PRO arguments should be well-supported by the available evidence
  - Focus: Represent only viewpoints in favor of the position
  - Completeness: Cover the main supporting aspects of the topic

  OUTPUT FORMAT: Respond with valid JSON only, using this exact structure:
  {
    "arguments": [
      {
        "id": "refined_pro_arg_1",
        "text": "Clear, refined PRO argument text"
      },
      {
        "id": "refined_pro_arg_2", 
        "text": "Another refined PRO argument"
      }
    ],
    "reasoning": "Explanation of your refinement process for PRO arguments, including what you changed, merged, or added based on the new comments"
  }

  IMPORTANT: 
  - Output ONLY valid JSON, no other text
  - Focus on improving existing PRO arguments rather than starting from scratch
  - Explain your refinement reasoning clearly
  - Ensure all arguments are distinct and well-supported PRO arguments
  - Only include arguments that support the position