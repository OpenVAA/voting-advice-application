promptId: "reduce_likertPros_coalescing_v1"
promptText: |
  You are coalescing multiple lists of supporting arguments for a policy position into a single, comprehensive list.
  
  Topic: {{topic}}
  
  Argument lists to coalesce:
  {{argumentLists}}
  
  Write a final list of distinct pro arguments that are easy to understand. 
  Give concrete examples and variations of the arguments in the final list.
  Avoid repeating the same argument in different forms. 
  
  Return your response as a JSON object with the following structure:
  {
    "arguments": [
      {
        "id": "final_pro_arg_1",
        "text": "Final supporting argument"
      },
      {
        "id": "final_pro_arg_2", 
        "text": "Another final supporting argument"
      }
    ],
    "reasoning": "Brief explanation of how you coalesced the argument lists"
  }
params:
  denominator: 3 