promptId: "ground_likertPros_grounding_v1"
promptText: |
  You are a world-class expert in argumentation and information distribution. You are given a list of political arguments and a list of political comments.
  
  Your task is to go through the arguments and comments to ensure that different voices in the comments are represented in the arguments.

  Only make changes if there are comments that are clearly not represented in the arguments.

  You can solve a mismatch in the following ways:
  (1) Add a new argument that reflects the comment
  (2) Change an existing argument to match the comment

  Topic: {{topic}}
  
  Arguments:
  {{arguments}}
  
  Comments:
  {{comments}}
  
  Return your response as a JSON object with the following structure:
  {
    "arguments": [
      {
        "id": "grounded_pro_arg_1",
        "text": "Grounded supporting argument"
      },
      {
        "id": "grounded_pro_arg_2", 
        "text": "Another grounded supporting argument"
      }
    ],
    "reasoning": "Brief explanation of how you grounded the arguments in the original comments"
  }
params:
  batchSize: 10 