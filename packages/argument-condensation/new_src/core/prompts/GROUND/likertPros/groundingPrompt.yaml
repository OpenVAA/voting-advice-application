promptId: "ground_likertPros_grounding_v1"
promptText: |
  You are grounding a list of supporting arguments for a policy position by refining them based on the original comments that inspired them.
  
  Topic: {{topic}}
  
  Arguments to ground:
  {{arguments}}
  
  Original comments for context:
  {{comments}}
  
  Please refine these arguments by:
  - Ensuring they accurately reflect the sentiments expressed in the original comments
  - Adding specific details or examples mentioned in the comments
  - Adjusting language to better match the tone and style of the original comments
  - Maintaining the supporting (pro) perspective while being grounded in the actual comment content
  
  Return your response as a JSON object with the following structure:
  {
    "arguments": [
      {
        "id": "grounded_pro_arg_1",
        "text": "Grounded supporting argument"
      },
      {
        "id": "grounded_pro_arg_2", 
        "text": "Another grounded supporting argument"
      }
    ],
    "reasoning": "Brief explanation of how you grounded the arguments in the original comments"
  }
params:
  batchSize: 10 