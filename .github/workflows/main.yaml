name: "Main tests & validation"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**/*/.env.example"
      - ".env.example"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "**/*/.env.example"
      - ".env.example"

jobs:
  skill-drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Check skill drift"
        run: .claude/scripts/audit-skill-drift.sh

  frontend-and-shared-module-validation:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Frontend source code"
        uses: actions/checkout@v4

      - name: Setup Yarn 4.6
        uses: threeal/setup-yarn-action@v2
        with:
          version: 4.6

      - name: Setup Node.js 20.18.1
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: "yarn"

      - name: "Install all dependencies"
        run: yarn install --frozen-lockfile

      - name: "Build all shared modules"
        run: yarn build:shared

      - name: "Run Prettier check globally"
        run: yarn format:check

      - name: "Run ESlint check on frontend"
        run: yarn lint:check

      - name: "Check that TranslationKey type is up to date"
        run: yarn workspace @openvaa/frontend generate:translation-key-type && git diff --exit-code

      - name: "Run Frontend and shared module tests"
        run: yarn test:unit

      - name: "Configure frontend environment using the repo root .env.example file"
        run: cp .env.example frontend/.env

      - name: "Build frontend"
        run: yarn workspace @openvaa/frontend build

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - name: "Configure environment"
        run: cp .env.example .env

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Yarn 4.6
        uses: threeal/setup-yarn-action@v2
        with:
          version: 4.6

      - name: Setup Node.js 20.18.1
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: "yarn"

      - name: "Install yarn dependencies"
        run: yarn install --frozen-lockfile

      - name: "Install playwright"
        run: yarn playwright install --with-deps

      - name: "Build shared packages"
        run: yarn build:shared

      - name: "Start Supabase"
        working-directory: apps/supabase
        run: supabase start

      - name: "Start frontend"
        run: yarn workspace @openvaa/frontend dev &

      - name: "Wait for frontend"
        run: |
          for i in $(seq 1 60); do
            curl -s http://localhost:5173 > /dev/null 2>&1 && break
            sleep 2
          done

      - name: "Run E2E tests"
        run: yarn test:e2e

      - name: "Upload playwright report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30

      - name: "Stop Supabase"
        if: always()
        working-directory: apps/supabase
        run: supabase stop

  e2e-visual-perf:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - name: "Configure environment"
        run: cp .env.example .env

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Yarn 4.6
        uses: threeal/setup-yarn-action@v2
        with:
          version: 4.6

      - name: Setup Node.js 20.18.1
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: "yarn"

      - name: "Install yarn dependencies"
        run: yarn install --frozen-lockfile

      - name: "Install playwright"
        run: yarn playwright install --with-deps

      - name: "Build shared packages"
        run: yarn build:shared

      - name: "Start Supabase"
        working-directory: apps/supabase
        run: supabase start

      - name: "Start frontend"
        run: yarn workspace @openvaa/frontend dev &

      - name: "Wait for frontend"
        run: |
          for i in $(seq 1 60); do
            curl -s http://localhost:5173 > /dev/null 2>&1 && break
            sleep 2
          done

      - name: "Run visual and performance tests"
        run: PLAYWRIGHT_VISUAL=1 PLAYWRIGHT_PERF=1 npx playwright test -c ./tests/playwright.config.ts --grep "@visual|@perf"

      - name: "Upload playwright report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-visual-perf
          path: tests/playwright-report/
          retention-days: 30

      - name: "Stop Supabase"
        if: always()
        working-directory: apps/supabase
        run: supabase stop

  supabase-tests:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            supabase:
              - 'apps/supabase/**'
              - 'packages/supabase-types/**'

      - uses: supabase/setup-cli@v1
        if: steps.changes.outputs.supabase == 'true'
        with:
          version: latest

      - name: "Start Supabase"
        if: steps.changes.outputs.supabase == 'true'
        working-directory: apps/supabase
        run: supabase start

      - name: "Run pgTAP tests"
        if: steps.changes.outputs.supabase == 'true'
        working-directory: apps/supabase
        run: supabase test db

      - name: "Stop Supabase"
        if: always() && steps.changes.outputs.supabase == 'true'
        working-directory: apps/supabase
        run: supabase stop
